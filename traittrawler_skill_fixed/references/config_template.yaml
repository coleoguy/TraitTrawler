# ============================================================
# collector_config.yaml — generated by setup wizard
# Edit any field to customize your project.
# ============================================================

project_name: "{PROJECT_NAME}"
project_root: "{PROJECT_ROOT}"
contact_email: "{CONTACT_EMAIL}"

target_taxa:
  - "{TAXA}"

trait_name: "{TRAIT_NAME}"
trait_description: >
  {TRAIT_DESCRIPTION}

triage_keywords:
  {TRIAGE_KEYWORDS}

triage_rules:
  likely: >
    Paper reports primary {TRAIT_NAME} data for {TAXA}. Title or journal
    strongly implies relevant content.
  uncertain: >
    Abstract absent or ambiguous. Title implies relevance but cannot confirm.
    Review or book chapter that may compile relevant data. Err toward uncertain
    — false negatives are permanent data loss.
  unlikely: >
    Clearly not about {TRAIT_NAME} for {TAXA}. Wrong taxa, wrong trait,
    or purely methodological without data relevant to this project.

proxy_url: "{PROXY_URL}"
institution: "{INSTITUTION}"

pdf_subfolder_field: "family"
vision_extraction: "ask"

output_csv: "{OUTPUT_CSV}"

# Core fields included in every project:
output_fields_core:
  - doi
  - paper_title
  - paper_authors
  - first_author
  - paper_year
  - paper_journal
  - species
  - family
  - subfamily
  - genus
  - extraction_confidence
  - flag_for_review
  - source_type
  - pdf_source
  - pdf_filename
  - pdf_url
  - notes
  - processed_date

# Trait-specific fields — the setup wizard MUST populate this list based on
# the user's chosen trait. Refer to csv_schema.md for the full field catalogue.
# The final output_fields is core + trait-specific merged in order.
#
# Example for karyotype projects:
#   output_fields_trait:
#     - chromosome_number_2n
#     - n_haploid
#     - sex_chr_system
#     - sex_of_specimen
#     - karyotype_formula
#     - haploid_autosome_count
#     - chromosome_morphology
#     - ploidy
#     - b_chromosomes
#     - staining_method
#     - NOR_position
#     - heterochromatin_pattern
#     - collection_locality
#     - country
#     - voucher_info
#     - collection_year
#     - number_of_specimens
output_fields_trait:
  {TRAIT_FIELDS}

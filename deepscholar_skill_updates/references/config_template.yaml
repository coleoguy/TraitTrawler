# ============================================================
# review_config.yaml — generated by setup wizard
# Edit any field to customize your review.
# ============================================================

project_name: "{PROJECT_NAME}"
project_root: "{PROJECT_ROOT}"
contact_email: "{CONTACT_EMAIL}"

# -----------------------------------------------------------
# Research questions — the core of the review
# Everything gets tagged back to these. Add/edit as the
# review evolves. IDs must be stable (don't renumber).
# -----------------------------------------------------------
research_questions:
  - id: rq_01
    question: "{QUESTION_1}"
    scope: "{SCOPE_1}"
  - id: rq_02
    question: "{QUESTION_2}"
    scope: "{SCOPE_2}"

# -----------------------------------------------------------
# Taxonomic / system scope
# -----------------------------------------------------------
focal_taxa:
  - "{TAXA_1}"

focal_systems: []  # e.g., ["sex chromosomes", "meiotic drive"]

# -----------------------------------------------------------
# Topic keywords for triage
# -----------------------------------------------------------
topic_keywords:
  - "{KEYWORD_1}"
  - "{KEYWORD_2}"

# -----------------------------------------------------------
# Triage rules (plain language, used by Scout and Orchestrator)
# -----------------------------------------------------------
triage_rules:
  likely: >
    Paper clearly addresses one or more research questions. Reports relevant
    data, theory, or synthesis on the topic.
  uncertain: >
    Abstract absent or ambiguous. Title implies possible relevance but cannot
    confirm. Review or book chapter that may touch on the topic. Err toward
    uncertain — false negatives are permanent knowledge loss.
  unlikely: >
    Clearly not relevant to any research question. Wrong taxa, wrong topic,
    or purely applied work with no evolutionary/theoretical component.

# -----------------------------------------------------------
# Institution proxy
# -----------------------------------------------------------
proxy_url: "{PROXY_URL}"
institution: "{INSTITUTION}"

# -----------------------------------------------------------
# Extraction settings
# -----------------------------------------------------------
vision_extraction: "ask"    # ask | always | never (for scanned PDFs)
batch_size: 25              # papers per batch before synthesis + continue prompt
synthesis_trigger: 25       # papers between synthesis runs
max_readers_parallel: 5     # max Reader subagents per batch

# -----------------------------------------------------------
# PDF organization
# -----------------------------------------------------------
pdf_naming: "{FirstAuthor}_{Year}_{JournalAbbrev}"

# -----------------------------------------------------------
# QC (quality control) settings
# These thresholds control which papers surface as re-extraction
# candidates when running /deepscholar qc.
# -----------------------------------------------------------
qc_settings:
  low_confidence_threshold: 0.65  # extraction_quality_score below this → Category B
  min_claims_full_text: 3         # full-text papers with fewer claims → Category B
  stale_days: 90                  # days since processing before staleness check
  stale_score_threshold: 0.80     # stale papers below this score → Category C
  post_qc_synthesis_threshold: 10 # re-extracted papers needed to trigger synthesis

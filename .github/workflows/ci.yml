name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff (non-blocking style)
        run: |
          ruff check skill/scripts/ skill/tests/ \
            --select E,F,W \
            --ignore E501 \
            --exit-zero

      - name: Check for syntax errors (blocking)
        run: |
          ruff check skill/scripts/ skill/tests/ \
            --select E9,F63,F7,F82

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      # v6 tests need pdfplumber (PDF text extraction) + fpdf2 (synthetic
      # PDFs for the grounding test). Nothing else.
      - name: Install dependencies
        run: pip install pdfplumber fpdf2

      - name: Compile all scripts
        run: python -m py_compile skill/scripts/*.py

      - name: Run smoke tests
        run: python skill/tests/test_smoke.py

      - name: Run real-PDF grounding tests
        run: python skill/tests/test_real_pdf_grounding.py

  validate-configs:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate example YAML configs
        run: |
          python -c "
          import yaml, sys
          configs = [
              'examples/coleoptera-karyotypes/collector_config.yaml',
              'examples/avian-body-mass/collector_config.yaml',
          ]
          for path in configs:
              try:
                  with open(path) as f:
                      yaml.safe_load(f)
                  print(f'  OK: {path}')
              except Exception as e:
                  print(f'  FAIL: {path}: {e}')
                  sys.exit(1)
          print('All YAML configs valid.')
          "

      - name: Validate example config.py files
        run: |
          python -c "
          import sys
          configs = [
              'examples/coleoptera-karyotypes/config.py',
              'examples/avian-body-mass/config.py',
          ]
          for path in configs:
              try:
                  ns = {}
                  with open(path) as f:
                      exec(f.read(), ns)
                  terms = ns.get('SEARCH_TERMS', [])
                  print(f'  OK: {path} ({len(terms)} search terms)')
              except Exception as e:
                  print(f'  FAIL: {path}: {e}')
                  sys.exit(1)
          print('All config.py files valid.')
          "

      # v6 SKILL.md frontmatter carries only name / description / allowed-tools
      # (Claude Code ignores other keys); the version lives in an HTML comment.
      - name: Validate SKILL.md frontmatter
        run: |
          python -c "
          import re, sys, yaml
          with open('skill/SKILL.md') as f:
              content = f.read()
          if not content.startswith('---'):
              print('FAIL: SKILL.md missing frontmatter')
              sys.exit(1)
          end = content.index('---', 3)
          frontmatter = yaml.safe_load(content[3:end])
          for key in ('name', 'description', 'allowed-tools'):
              if key not in frontmatter:
                  print(f'FAIL: SKILL.md missing frontmatter key: {key}')
                  sys.exit(1)
          m = re.search(r'version:\s*([0-9][^\s]*)', content)
          version = m.group(1) if m else 'unknown'
          print(f'SKILL.md frontmatter valid (v{version})')
          "

  validate-sample-csv:
    name: Validate Sample CSV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # Dependency-free structural check (the v5 csv_writer validator was
      # removed in the v6 rewrite; row-level grounding is covered by the
      # skill/tests/ suite).
      - name: Validate sample_results.csv is well-formed
        run: |
          python -c "
          import csv, sys
          path = 'examples/sample_results.csv'
          with open(path, newline='') as f:
              rows = list(csv.reader(f))
          if len(rows) < 2:
              print(f'FAIL: {path} has no data rows')
              sys.exit(1)
          header = rows[0]
          ncols = len(header)
          for i, row in enumerate(rows[1:], start=2):
              if len(row) != ncols:
                  print(f'FAIL: row {i} has {len(row)} cols, expected {ncols}')
                  sys.exit(1)
          for required in ('species', 'doi'):
              if required not in header:
                  print(f'FAIL: {path} missing required column: {required}')
                  sys.exit(1)
          print(f'{path} well-formed: {len(rows) - 1} rows x {ncols} cols')
          "

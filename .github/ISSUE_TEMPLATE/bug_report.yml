name: Bug report
description: Report a problem with the TraitTrawler agent
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: input
    id: stage
    attributes:
      label: Agent stage
      description: Where in the pipeline did the issue occur?
      placeholder: e.g., search, triage, retrieval, extraction, validation
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Relevant configuration, paper DOI, error messages, etc.
    validations:
      required: false

# ============================================================
# collector_config.yaml — generated by setup wizard
# Edit any field to customize your project.
# ============================================================

project_name: "{PROJECT_NAME}"
contact_email: "{CONTACT_EMAIL}"

target_taxa:
  {TAXA}

trait_name: "{TRAIT_NAME}"
trait_description: >
  {TRAIT_DESCRIPTION}

triage_keywords:
  {TRIAGE_KEYWORDS}

triage_rules:
  likely: >
    Paper reports primary {TRAIT_NAME} data for {TAXA}. Title or journal
    strongly implies relevant content.
  uncertain: >
    Abstract absent or ambiguous. Title implies relevance but cannot confirm.
    Review or book chapter that may compile relevant data. Err toward uncertain
    — false negatives are permanent data loss.
  unlikely: >
    Clearly not about {TRAIT_NAME} for {TAXA}. Wrong taxa, wrong trait,
    or purely methodological without data relevant to this project.

proxy_url: "{PROXY_URL}"
institution: "{INSTITUTION}"

pdf_subfolder_field: "family"
vision_extraction: "ask"

# --- Session control ---
# How many papers to process before pausing for review.
# Set to a number (e.g. 20) or "unlimited" to run until stopped.
batch_size: 20

# Print a rolling progress update every N papers.
report_every: 5

# --- v4 Extraction pipeline ---
# "consensus" (default): 3 Sonnet agents per paper with majority-rule voting.
#   Best accuracy. ~3x extraction token cost per paper.
# "fast": 1 Sonnet agent per paper, no voting. Use for exploratory runs,
#   well-understood traits, or when budget is tight.
extraction_mode: consensus

# How many papers to extract in parallel. Each Dealer handles one paper.
# In consensus mode, each Dealer spawns 3 extraction agents, so peak
# concurrent agents = max_concurrent_dealers * 3.
# Increase to 3-4 if extraction is the bottleneck; set to 1 for debugging.
concurrency:
  max_concurrent_dealers: 2

taxonomy_api: "gbif"

# Output is always written to results.csv in the project root.
# Do not change this — the dashboard, verification, and all other
# tools depend on this filename.

# All output fields in CSV column order.
# The setup wizard populates this list with paper metadata fields
# followed by trait-specific fields. Edit freely.
output_fields:
  # --- Paper metadata (always present) ---
  - doi
  - paper_title
  - paper_authors
  - first_author
  - paper_year
  - paper_journal
  - session_id
  # --- Taxonomy ---
  - species
  - family
  - subfamily
  - genus
  # --- Trait-specific fields (generated by setup wizard) ---
  {TRAIT_FIELDS}
  # --- Collection info ---
  - collection_locality
  - country
  # --- Provenance ---
  - source_page
  - source_context
  - extraction_reasoning
  # --- Taxonomy intelligence ---
  - accepted_name
  - gbif_key
  - taxonomy_note
  # --- Data quality (always present) ---
  - extraction_confidence
  - flag_for_review
  - source_type
  - pdf_source
  - pdf_filename
  - pdf_url
  - notes
  - processed_date
  # --- Calibration & consensus ---
  - calibrated_confidence
  - consensus
  - extraction_trace_id
  # --- Audit tracking ---
  - audit_status
  - audit_session
  - audit_prior_values

# --- Model routing (v4) ---
# v4 uses a simpler two-tier model: Opus manages, Sonnet works.
# Opus escalation happens automatically when Sonnet consensus fails.
# You generally don't need to change these defaults.
# model_routing:
#   manager: opus         # Coordinator (this is the skill's default model)
#   sub_processes: sonnet  # All pipeline agents (search, fetch, extract, write)
#   escalation: opus       # Triggered when consensus fails on a paper

# --- Audit mode (optional) ---
# Self-cleaning: re-examines low-confidence, statistically anomalous, and
# guide-drift records by re-reading cached PDFs with current domain knowledge.
# audit_config:
#   auto_audit: false            # Offer audit pass every N sessions
#   auto_audit_interval: 5       # Sessions between automatic audit offers
#   confidence_threshold: 0.6    # Records below this are audit candidates
#   max_records: 50              # Max records to audit per session
#   outlier_sd_threshold: 3      # Flag numeric values > N SD from group mean
#   outlier_min_group_size: 10   # Min records in group before outlier detection

# --- Pause triggers (optional) ---
# The agent pauses and shows you the record when any trigger fires.
# Remove or comment out triggers you don't want.
# pause_triggers:
#   - field: extraction_confidence
#     operator: less_than
#     value: 0.6
#     action: show_records
#   - field: records_added_this_session
#     operator: greater_than
#     value: 100
#     action: ask_continue

# --- Required fields ---
# Fields that must be non-empty for a record to be written to results.csv.
# Records missing any required field are dropped (logged to needs_attention.csv).
# doi and extraction_confidence are always required regardless of this list.
# For among-species projects, the wizard adds "species" here.
# For within-species projects (population-level data for a single species),
# species is NOT required — the key field might be locality, population, etc.
# required_fields:
#   - species

# --- Deduplication key ---
# Fields that together define a unique record. Records matching ALL dedup_key
# fields against an existing row in results.csv are skipped as duplicates.
# Records matching all fields EXCEPT doi are kept (independent observations).
# The setup wizard generates this. If not set, falls back to doi + all trait fields.
#
# Among-species example:
# dedup_key:
#   - species
#   - doi
#   - body_mass_g_mean
#
# Within-species example (population-level data):
# dedup_key:
#   - population
#   - doi
#   - body_mass_g_mean

# --- Compilation tables ---
# How to handle tables that compile previously published values from other
# papers (common in review/comparative papers).
# "skip" (default): Only extract primary data. Safest — no misattribution.
# "extract_attributed": Extract with source_type="compilation" and lower
#   confidence. Captures more data but risks transcription errors.
# "extract_as_leads": Don't extract values, but capture the cited references
#   so the Searcher can find the original papers.
compilation_tables: extract_attributed

# --- Taxonomy resolution (optional) ---
# Validate species names against GBIF Backbone Taxonomy.
# Resolves synonyms to accepted names, auto-fills higher taxonomy.
# Original names preserved in notes field when changed.
# Set to false for within-species projects or when the unit isn't a species.
taxonomy_resolution: true
# taxonomy_kingdom: "Animalia"  # GBIF kingdom filter (Animalia, Plantae, Fungi)

# --- Campaign planning (optional) ---
# campaign_planning:
#   auto_report_interval: 5   # Sessions between automatic campaign reports

# --- Validation rules (optional) ---
# Cross-field checks run before writing each record.
# on_fail: "flag" (write with flag_for_review=true), "drop" (skip, log to needs_attention.csv), "ask" (pause for user)
# validation_rules:
#   - field: body_mass_g_mean
#     type: numeric_range
#     min: 0.001
#     max: 200000
#     on_fail: flag

# --- Consensus extraction (v4) ---
# In v4, consensus is controlled by extraction_mode above (consensus/fast).
# When extraction_mode is "consensus", ALL papers get 3-agent voting.
# When extraction_mode is "fast", papers get single-agent extraction.
# The user chooses the mode at session start.
# These settings fine-tune consensus behavior:
# consensus_config:
#   opus_escalation: true         # Escalate to Opus when Sonnet consensus fails
#   opus_confidence_threshold: 0.7 # Opus result accepted if mean confidence >= this

# --- Confidence calibration (optional, §19) ---
# Post-hoc calibration transforms raw confidence heuristics into
# empirically validated probabilities using isotonic regression.
# Requires benchmark data from calibration holdouts, audits, or corrections.
# calibration_config:
#   enabled: true
#   min_observations: 10  # Minimum calibration data points before fitting
#   recalibrate_every: 20 # Re-fit model after N new observations

# --- Benchmarking (optional, §20) ---
# Built-in accuracy benchmarking against gold-standard data.
# benchmarking_config:
#   holdout_papers: 2     # Papers reserved for blind evaluation during calibration
#   auto_benchmark: true  # Automatically benchmark at session end if new data exists

# --- Cross-project transfer learning (optional, §25) ---
# Share learned extraction patterns across TraitTrawler projects.
# transfer_learning:
#   enabled: true
#   shared_dir: "~/.claude/traittrawler_shared"  # Cross-project knowledge directory

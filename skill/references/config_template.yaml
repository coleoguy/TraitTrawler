# ============================================================
# collector_config.yaml — generated by setup wizard
# Edit any field to customize your project.
# ============================================================

project_name: "{PROJECT_NAME}"
project_root: "{PROJECT_ROOT}"
contact_email: "{CONTACT_EMAIL}"

target_taxa:
  - "{TAXA}"

trait_name: "{TRAIT_NAME}"
trait_description: >
  {TRAIT_DESCRIPTION}

triage_keywords:
  {TRIAGE_KEYWORDS}

triage_rules:
  likely: >
    Paper reports primary {TRAIT_NAME} data for {TAXA}. Title or journal
    strongly implies relevant content.
  uncertain: >
    Abstract absent or ambiguous. Title implies relevance but cannot confirm.
    Review or book chapter that may compile relevant data. Err toward uncertain
    — false negatives are permanent data loss.
  unlikely: >
    Clearly not about {TRAIT_NAME} for {TAXA}. Wrong taxa, wrong trait,
    or purely methodological without data relevant to this project.

proxy_url: "{PROXY_URL}"
institution: "{INSTITUTION}"

pdf_subfolder_field: "family"
vision_extraction: "ask"

output_csv: "{OUTPUT_CSV}"

output_fields:
  - doi
  - paper_title
  - paper_authors
  - first_author
  - paper_year
  - paper_journal
  - species
  - family
  - subfamily
  - genus
  - extraction_confidence
  - flag_for_review
  - source_type
  - pdf_source
  - pdf_filename
  - pdf_url
  - notes
  - processed_date
  # Add trait-specific fields here, e.g.:
  # - chromosome_number_2n
  # - sex_chr_system

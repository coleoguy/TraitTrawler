# ============================================================
# Coleoptera Karyotype Database — Project Configuration
# ============================================================
# This is a working example. To use it:
# 1. Copy this entire folder to a new location
# 2. Update proxy_url and institution for your library
# 3. Update contact_email
# 4. Open the folder in Cowork with TraitTrawler installed
# 5. Say "let's collect some data"
# ============================================================

project_name: "Coleoptera Karyotype Database"
project_root: "."
contact_email: "you@university.edu"

target_taxa:
  - "Coleoptera"
  - "beetles"

trait_name: "karyotype"
trait_description: >
  Primary karyotype data: chromosome numbers (2n), sex chromosome systems,
  karyotype formulas, cytogenetic analyses, C-banding, FISH, NOR, ploidy,
  B chromosomes. Includes both focal-species data and comparative tables.

triage_keywords:
  - karyotype
  - chromosome
  - cytogenetics
  - cytology
  - "2n ="
  - "sex chromosome"
  - C-banding
  - FISH
  - NOR
  - heterochromatin
  - ploidy

triage_rules:
  likely: >
    Paper reports original chromosome counts, sex chromosome systems, karyotype
    formulas, or cytogenetic analyses for Coleoptera. Title/journal strongly
    implies cytogenetics data (e.g., Comparative Cytogenetics, Caryologia,
    Genetica with beetle subject).
  uncertain: >
    Abstract absent or ambiguous. Title mentions chromosomes/cytogenetics without
    explicit data. Review or book chapter that may compile karyotype tables.
    Err toward uncertain — false negatives are permanent data loss.
  unlikely: >
    Clearly not about cytogenetics: behavior, ecology, morphology, molecular
    phylogenetics without chromosomal component, genome assembly without
    karyotype data, biochemistry, pest management.

proxy_url: "http://proxy.library.tamu.edu/login?url="
institution: "Texas A&M University"

pdf_subfolder_field: "family"
vision_extraction: "ask"

# --- Audit mode ---
# Karyotypes benefit heavily from audit: sex chromosome notation is the #1
# source of low-confidence records, and guide.md updates frequently fix these.
audit_config:
  auto_audit: true
  auto_audit_interval: 5
  confidence_threshold: 0.6
  max_records: 50
  outlier_sd_threshold: 3
  outlier_min_group_size: 10

# --- Model routing ---
# Karyotype notation is complex enough that sonnet handles most extraction,
# but dense catalogue tables and ambiguous sex chromosome formulas benefit
# from opus escalation. Search/triage are trivial → haiku.
model_routing:
  search: haiku
  triage: haiku
  state_management: haiku
  extraction: sonnet
  validation: sonnet
  knowledge_review: sonnet
  escalation_model: opus
  escalation_confidence_threshold: 0.5
  escalation_row_mismatch_pct: 10

# --- Session control ---
batch_size: 20
report_every: 5

taxonomy_api: "gbif"
gbif_kingdom: "Animalia"

output_csv: "results.csv"

output_fields:
  # Paper metadata
  - doi
  - paper_title
  - paper_authors
  - first_author
  - paper_year
  - paper_journal
  - session_id
  # Taxonomy
  - species
  - family
  - subfamily
  - genus
  # Core karyotype
  - chromosome_number_2n
  - n_haploid
  - sex_chr_system
  - sex_of_specimen
  - karyotype_formula
  - chromosome_morphology
  - haploid_autosome_count
  - ploidy
  - b_chromosomes
  # Cytogenetic methods
  - staining_method
  - NOR_position
  - heterochromatin_pattern
  # Collection info
  - collection_locality
  - country
  - voucher_info
  - collection_year
  - number_of_specimens
  # Provenance
  - source_page
  - source_context
  - extraction_reasoning
  # Quality
  - extraction_confidence
  - flag_for_review
  - source_type
  - pdf_source
  - pdf_filename
  - pdf_url
  - notes
  - processed_date
